apiVersion: v1
kind: Service
metadata:
  name: "llm-gateway"
  labels:
    ai-services.io/application: {{ .Release.Name }}
    ai-services.io/template: {{ .Chart.Name }}
    ai-services.io/version: {{ default .Chart.AppVersion | quote }}
spec:
  selector:
    ai-services.io/application: {{ .Release.Name }}
    ai-services.io/component: llm-gateway
  ports:
    - port: 4000
      targetPort: 4000
      protocol: TCP
  type: ClusterIP
