apiVersion: apps/v1
kind: Deployment
metadata:
  name: "digitize-api"
  labels:
    ai-services.io/application: {{ .Release.Name }}
    ai-services.io/template: {{ .Chart.Name }}
    ai-services.io/version: {{ default .Chart.AppVersion | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      ai-services.io/application: {{ .Release.Name }}
      ai-services.io/component: digitize-api
  template:
    metadata:
      labels:
        ai-services.io/application: {{ .Release.Name }}
        ai-services.io/template: {{ .Chart.Name }}
        ai-services.io/component: digitize-api
        ai-services.io/version: {{ default .Chart.AppVersion | quote }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: digitize-api
          image: "{{ .Values.digitize.image }}"
          command:
            - "/var/venv/bin/python"
            - "-m"
            - "uvicorn"
            - "digitize.app:app"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "4000"
            - "--loop"
            - "uvloop"
            - "--http"
            - "httptools"
          env:
            - name: EMB_ENDPOINT
              value: http://embedding-predictor:8080
            - name: EMB_MODEL
              value: ibm-granite/granite-embedding-278m-multilingual
            - name: EMB_MAX_TOKENS
              value: "512"
            - name: LLM_ENDPOINT
              value: http://instruct-predictor:8000
            - name: LLM_MODEL
              value: ibm-granite/granite-3.3-8b-instruct
            - name: OPENSEARCH_HOST
              value: "opensearch"
            - name: OPENSEARCH_PORT
              value: "9200"
            - name: OPENSEARCH_DB_PREFIX
              value: "RAG_DB"
            - name: OPENSEARCH_INDEX_NAME
              value: "RAG_INDEX"
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: "opensearch-credentials"
                  key: username
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "opensearch-credentials"
                  key: password
            - name: OPENSEARCH_NUM_SHARDS
              value: "{{ .Values.opensearch.numShards }}"
            - name: LOG_LEVEL
              value: "{{ .Values.digitize.log_level }}"
            - name: OMP_NUM_THREADS
              value: "4"
            - name: MKL_NUM_THREADS
              value: "4"
            - name: DOCLING_NUM_THREADS
              value: "4"
            - name: OPENBLAS_NUM_THREADS
              value: "1"
          ports:
            - containerPort: 4000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "16"
              memory: "50Gi"
            limits:
              cpu: "16"
              memory: "50Gi"
          volumeMounts:
            - mountPath: /var/cache
              name: cache
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: cache
