apiVersion: apps/v1
kind: Deployment
metadata:
  name: "digitize-ui"
  labels:
    ai-services.io/application: {{ .Release.Name }}
    ai-services.io/template: {{ .Chart.Name }}
    ai-services.io/version: {{ default .Chart.AppVersion | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      ai-services.io/application: {{ .Release.Name }}
      ai-services.io/component: digitize-ui
  template:
    metadata:
      labels:
        ai-services.io/application: {{ .Release.Name }}
        ai-services.io/template: {{ .Chart.Name }}
        ai-services.io/component: digitize-ui
        ai-services.io/version: {{ default .Chart.AppVersion | quote }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: digitize-ui
          image: "{{ .Values.digitizeUi.image }}"
          resources:
            requests:
              cpu: "50m"
              memory: "512Mi"
            limits:
              cpu: "50m"
              memory: "512Mi"
          env:
            - name: BACKEND_HOST
              value: "digitize-api"
            - name: BACKEND_PORT
              value: "4000"
          ports:
            - containerPort: 4001
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 4001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 4001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
